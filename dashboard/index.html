<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Acme Logistics — AI Operations</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --bg:#080c14;--surface:#0d1420;--surface2:#111827;
      --border:rgba(255,255,255,0.06);--accent:#00d4ff;--accent2:#7c3aed;
      --green:#00e5a0;--red:#ff4757;--orange:#ff9f1c;
      --text:#e8eaf0;--muted:#4a5568;
      --mono:'Space Mono',monospace;--sans:'Syne',sans-serif;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
    body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,212,255,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,212,255,0.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0}
    body::after{content:'';position:fixed;top:-30%;left:-20%;width:60%;height:60%;background:radial-gradient(ellipse,rgba(0,212,255,0.05) 0%,transparent 70%);pointer-events:none;z-index:0}
    header{position:relative;z-index:10;display:flex;align-items:center;justify-content:space-between;padding:1.5rem 2.5rem;border-bottom:1px solid var(--border);backdrop-filter:blur(20px);background:rgba(8,12,20,0.8)}
    .logo-area{display:flex;align-items:center;gap:1rem}
    .logo-icon{width:36px;height:36px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;color:#fff}
    .logo-text h1{font-weight:800;font-size:1rem;letter-spacing:0.02em}
    .logo-text p{font-family:var(--mono);font-size:0.65rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.1em;margin-top:1px}
    .header-right{display:flex;align-items:center;gap:1rem}
    .live-badge{display:flex;align-items:center;gap:0.4rem;padding:0.3rem 0.75rem;border:1px solid rgba(0,229,160,0.3);border-radius:100px;font-family:var(--mono);font-size:0.65rem;color:var(--green);text-transform:uppercase;letter-spacing:0.1em}
    .live-dot{width:6px;height:6px;background:var(--green);border-radius:50%;animation:pulse 2s infinite}
    @keyframes pulse{0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(0,229,160,0.4)}50%{opacity:.7;box-shadow:0 0 0 4px rgba(0,229,160,0)}}
    .refresh-btn{display:flex;align-items:center;gap:0.5rem;padding:0.4rem 1rem;background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:var(--mono);font-size:0.7rem;cursor:pointer;transition:all .2s;text-transform:uppercase;letter-spacing:0.05em}
    .refresh-btn:hover{background:rgba(0,212,255,0.1);border-color:rgba(0,212,255,0.3);color:var(--accent)}
    main{position:relative;z-index:1;padding:2rem 2.5rem;display:flex;flex-direction:column;gap:1.5rem}
    .section-label{font-family:var(--mono);font-size:0.65rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.15em;margin-bottom:.75rem;display:flex;align-items:center;gap:.5rem}
    .section-label::after{content:'';flex:1;height:1px;background:var(--border)}
    .kpi-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:1rem}
    .kpi-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.25rem;position:relative;overflow:hidden;transition:border-color .3s,transform .2s}
    .kpi-card:hover{transform:translateY(-2px);border-color:rgba(0,212,255,0.2)}
    .kpi-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--card-accent,var(--accent));opacity:.6}
    .kpi-card.green{--card-accent:var(--green)}.kpi-card.red{--card-accent:var(--red)}.kpi-card.orange{--card-accent:var(--orange)}.kpi-card.purple{--card-accent:var(--accent2)}
    .kpi-label{font-family:var(--mono);font-size:0.6rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.12em;margin-bottom:.75rem}
    .kpi-value{font-family:var(--sans);font-size:2.4rem;font-weight:800;line-height:1;color:var(--text)}
    .kpi-value.accent{color:var(--accent)}.kpi-value.green{color:var(--green)}.kpi-value.red{color:var(--red)}.kpi-value.orange{color:var(--orange)}.kpi-value.purple{color:var(--accent2)}
    .kpi-sub{font-family:var(--mono);font-size:0.6rem;color:var(--muted);margin-top:.4rem}
    .charts-row{display:grid;grid-template-columns:1fr 1fr 2fr;gap:1rem}
    .chart-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.25rem}
    .chart-title{font-family:var(--mono);font-size:0.65rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:1.25rem}
    .chart-wrap{position:relative;height:180px;display:flex;align-items:center;justify-content:center}
    .table-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden}
    .table-header{padding:1rem 1.25rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
    .table-title{font-family:var(--mono);font-size:0.65rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.1em}
    .table-count{font-family:var(--mono);font-size:0.65rem;color:var(--accent)}
    table{width:100%;border-collapse:collapse}
    th{font-family:var(--mono);font-size:0.6rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.1em;text-align:left;padding:.75rem 1.25rem;border-bottom:1px solid var(--border);background:rgba(0,0,0,.2)}
    td{font-family:var(--mono);font-size:.72rem;padding:.85rem 1.25rem;border-bottom:1px solid rgba(255,255,255,.03);color:var(--text)}
    tr:last-child td{border-bottom:none}
    tr:hover td{background:rgba(0,212,255,.03)}
    .mc-badge{font-family:var(--mono);font-size:.68rem;color:var(--accent);background:rgba(0,212,255,.08);padding:.2rem .5rem;border-radius:4px;border:1px solid rgba(0,212,255,.15)}
    .badge{display:inline-flex;align-items:center;padding:.2rem .6rem;border-radius:100px;font-family:var(--mono);font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em}
    .badge-booked{background:rgba(0,229,160,.1);color:var(--green);border:1px solid rgba(0,229,160,.25)}
    .badge-no_deal{background:rgba(255,71,87,.1);color:var(--red);border:1px solid rgba(255,71,87,.25)}
    .badge-abandoned{background:rgba(255,159,28,.1);color:var(--orange);border:1px solid rgba(255,159,28,.25)}
    .badge-positive{background:rgba(0,229,160,.1);color:var(--green);border:1px solid rgba(0,229,160,.25)}
    .badge-neutral{background:rgba(0,212,255,.1);color:var(--accent);border:1px solid rgba(0,212,255,.25)}
    .badge-negative{background:rgba(255,71,87,.1);color:var(--red);border:1px solid rgba(255,71,87,.25)}
    .rate-value{color:var(--green)}
    .empty-state{text-align:center;padding:3rem;color:var(--muted);font-family:var(--mono);font-size:.75rem}
    @media(max-width:1200px){.kpi-grid{grid-template-columns:repeat(3,1fr)}.charts-row{grid-template-columns:1fr 1fr}}
  </style>
</head>
<body>
<header>
  <div class="logo-area">
    <div class="logo-icon">A</div>
    <div class="logo-text">
      <h1>Acme Logistics</h1>
      <p>AI Carrier Sales · Operations Dashboard</p>
    </div>
  </div>
  <div class="header-right">
    <div class="live-badge"><div class="live-dot"></div>Live</div>
    <button class="refresh-btn" id="refreshBtn">↻ Refresh</button>
  </div>
</header>

<main>
  <div>
    <div class="section-label">Performance Overview</div>
    <div class="kpi-grid" id="kpiGrid"></div>
  </div>
  <div>
    <div class="section-label">Breakdown</div>
    <div class="charts-row">
      <div class="chart-card">
        <div class="chart-title">Outcome Distribution</div>
        <div class="chart-wrap"><canvas id="outcomeChart"></canvas></div>
      </div>
      <div class="chart-card">
        <div class="chart-title">Carrier Sentiment</div>
        <div class="chart-wrap"><canvas id="sentimentChart"></canvas></div>
      </div>
      <div class="chart-card">
        <div class="chart-title">Recent Activity</div>
        <div class="chart-wrap"><canvas id="timelineChart"></canvas></div>
      </div>
    </div>
  </div>
  <div>
    <div class="section-label">Recent Calls</div>
    <div class="table-card">
      <div class="table-header">
        <span class="table-title">Call Records</span>
        <span class="table-count" id="tableCount">—</span>
      </div>
      <table>
        <thead>
          <tr><th>MC Number</th><th>Load ID</th><th>Outcome</th><th>Sentiment</th><th>Agreed Rate</th><th>Rounds</th></tr>
        </thead>
        <tbody id="callsTable"></tbody>
      </table>
    </div>
  </div>
</main>

<script>
const API_KEY = 'hr_secret_2026';
let outcomeChart, sentimentChart, timelineChart;

function animateValue(el, target, isFloat, suffix) {
  const duration = 800;
  const start = performance.now();
  function step(now) {
    const p = Math.min((now - start) / duration, 1);
    const ease = 1 - Math.pow(1 - p, 3);
    const val = target * ease;
    el.textContent = (isFloat ? val.toFixed(1) : Math.round(val)) + (suffix || '');
    if (p < 1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

function makeEl(tag, cls, text) {
  const el = document.createElement(tag);
  if (cls) el.className = cls;
  if (text !== undefined) el.textContent = text;
  return el;
}

function renderKPIs(d) {
  const grid = document.getElementById('kpiGrid');
  const items = [
    { label: 'Total Calls', value: d.total_calls, cls: '', valCls: 'accent', float: false, sub: 'all time' },
    { label: 'Booked', value: d.booked, cls: 'green', valCls: 'green', float: false, sub: 'completed deals' },
    { label: 'No Deal', value: d.no_deal, cls: 'red', valCls: 'red', float: false, sub: 'negotiations failed' },
    { label: 'Abandoned', value: d.abandoned, cls: 'orange', valCls: 'orange', float: false, sub: 'dropped calls' },
    { label: 'Conversion Rate', value: d.conversion_rate * 100, cls: 'purple', valCls: 'purple', float: true, suffix: '%', sub: 'booked / total' },
  ];
  grid.textContent = '';
  items.forEach(function(item) {
    const card = makeEl('div', 'kpi-card ' + item.cls);
    const lbl = makeEl('div', 'kpi-label', item.label);
    const val = makeEl('div', 'kpi-value ' + item.valCls, '0');
    const sub = makeEl('div', 'kpi-sub', item.sub);
    card.appendChild(lbl);
    card.appendChild(val);
    card.appendChild(sub);
    grid.appendChild(card);
    animateValue(val, item.value, item.float, item.suffix || '');
  });
}

const CHART_OPT = {
  plugins: { legend: { labels: { color: '#4a5568', font: { family: 'Space Mono', size: 10 }, padding: 12 } } }
};

function renderCharts(d) {
  if (outcomeChart) outcomeChart.destroy();
  outcomeChart = new Chart(document.getElementById('outcomeChart'), {
    type: 'doughnut',
    data: {
      labels: ['Booked', 'No Deal', 'Abandoned'],
      datasets: [{ data: [d.booked, d.no_deal, d.abandoned], backgroundColor: ['#00e5a0','#ff4757','#ff9f1c'], borderWidth: 0, hoverOffset: 4 }]
    },
    options: { ...CHART_OPT, cutout: '70%' }
  });

  const sentLabels = Object.keys(d.sentiment_breakdown);
  const sentData = Object.values(d.sentiment_breakdown);
  if (sentimentChart) sentimentChart.destroy();
  sentimentChart = new Chart(document.getElementById('sentimentChart'), {
    type: 'doughnut',
    data: {
      labels: sentLabels,
      datasets: [{ data: sentData, backgroundColor: ['#00e5a0','#00d4ff','#ff4757','#7c3aed'], borderWidth: 0, hoverOffset: 4 }]
    },
    options: { ...CHART_OPT, cutout: '70%' }
  });

  const hours = Array.from({length: 8}, function(_, i) {
    return ((new Date().getHours() - 7 + i + 24) % 24) + ':00';
  });
  const vals = hours.map(function() { return 0; });
  (d.recent_calls || []).forEach(function(_, i) { if (i < 8) vals[7] += 1; });

  if (timelineChart) timelineChart.destroy();
  timelineChart = new Chart(document.getElementById('timelineChart'), {
    type: 'bar',
    data: {
      labels: hours,
      datasets: [{ label: 'Calls', data: vals, backgroundColor: 'rgba(0,212,255,0.15)', borderColor: 'rgba(0,212,255,0.6)', borderWidth: 1, borderRadius: 4 }]
    },
    options: {
      ...CHART_OPT,
      scales: {
        x: { ticks: { color: '#4a5568', font: { family: 'Space Mono', size: 9 } }, grid: { color: 'rgba(255,255,255,0.04)' } },
        y: { ticks: { color: '#4a5568', font: { family: 'Space Mono', size: 9 }, stepSize: 1 }, grid: { color: 'rgba(255,255,255,0.04)' }, beginAtZero: true }
      }
    }
  });
}

function renderTable(calls) {
  const tbody = document.getElementById('callsTable');
  const countEl = document.getElementById('tableCount');
  countEl.textContent = calls.length + ' records';
  tbody.textContent = '';

  if (!calls.length) {
    const tr = document.createElement('tr');
    const td = makeEl('td', 'empty-state', 'No calls recorded yet');
    td.setAttribute('colspan', '6');
    tr.appendChild(td);
    tbody.appendChild(tr);
    return;
  }

  calls.forEach(function(c) {
    const tr = document.createElement('tr');

    // MC Number
    const tdMc = document.createElement('td');
    const mcSpan = makeEl('span', 'mc-badge', c.mc_number || '—');
    tdMc.appendChild(mcSpan);
    tr.appendChild(tdMc);

    // Load ID
    const tdLoad = makeEl('td', '', c.load_id || '—');
    tdLoad.style.color = 'var(--muted)';
    tr.appendChild(tdLoad);

    // Outcome
    const tdOut = document.createElement('td');
    const outBadge = makeEl('span', 'badge badge-' + (c.outcome || ''), c.outcome || '—');
    tdOut.appendChild(outBadge);
    tr.appendChild(tdOut);

    // Sentiment
    const tdSent = document.createElement('td');
    const sent = c.sentiment || 'neutral';
    const sentBadge = makeEl('span', 'badge badge-' + sent, sent);
    tdSent.appendChild(sentBadge);
    tr.appendChild(tdSent);

    // Rate
    const tdRate = makeEl('td', 'rate-value', c.agreed_rate ? '$' + Number(c.agreed_rate).toLocaleString() : '—');
    tr.appendChild(tdRate);

    // Rounds
    const tdRounds = makeEl('td', '', String(c.num_negotiations ?? 0));
    tdRounds.style.color = 'var(--muted)';
    tdRounds.style.textAlign = 'center';
    tr.appendChild(tdRounds);

    tbody.appendChild(tr);
  });
}

async function loadMetrics() {
  try {
    const res = await fetch('/metrics', { headers: { 'x-api-key': API_KEY } });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const d = await res.json();
    renderKPIs(d);
    renderCharts(d);
    renderTable(d.recent_calls || []);
  } catch (err) {
    console.error('Dashboard error:', err);
  }
}

document.getElementById('refreshBtn').addEventListener('click', loadMetrics);
loadMetrics();
setInterval(loadMetrics, 30000);
</script>
</body>
</html>
