<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Acme Logistics — Carrier Sales</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="dashboard.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
  <div class="aurora-layer" aria-hidden="true">
    <div class="aurora-blob aurora-blob-1"></div>
    <div class="aurora-blob aurora-blob-2"></div>
    <div class="aurora-blob aurora-blob-3"></div>
  </div>

  <header>
    <div class="logo-area">
      <div class="logo-icon" aria-hidden="true">A</div>
      <div class="logo-text">
        <h1>Acme Logistics</h1>
        <p>Carrier sales · operations</p>
      </div>
    </div>
    <div class="header-right">
      <div class="live-badge"><span class="live-dot" aria-hidden="true"></span>Live</div>
      <button type="button" class="btn" id="autoRefreshBtn" aria-pressed="false">Auto</button>
      <button type="button" class="btn" id="refreshBtn">Refresh</button>
    </div>
  </header>

  <main>
    <div>
      <div class="section-label">Performance</div>
      <div id="emptyGlobalHint" class="empty-global-hint hidden" role="status" aria-live="polite"></div>
      <div class="kpi-grid" id="kpiGrid"></div>
    </div>

    <div>
      <div class="section-label">Analytics</div>
      <div class="charts-row">
        <div class="chart-card">
          <div class="chart-title">Outcome</div>
          <div class="chart-wrap"><canvas id="outcomeChart" aria-label="Outcome distribution"></canvas></div>
        </div>
        <div class="chart-card">
          <div class="chart-title">Sentiment</div>
          <div class="chart-wrap"><canvas id="sentimentChart" aria-label="Sentiment distribution"></canvas></div>
        </div>
        <div class="chart-card">
          <div class="chart-title">
            <span>Calls · 7 days</span>
            <span id="trendLabel"></span>
          </div>
          <div class="chart-wrap tall"><canvas id="timelineChart" aria-label="Calls over time"></canvas></div>
        </div>
      </div>
    </div>

    <div>
      <div class="section-label">Call records</div>
      <div class="table-card">
        <div class="table-header">
          <div style="display:flex;align-items:center;gap:.5rem;flex-wrap:wrap">
            <span class="table-title">All calls</span>
            <span class="table-count" id="tableCount" aria-live="polite">—</span>
          </div>
          <div class="filters-bar">
            <label class="visually-hidden" for="searchInput">Search by MC or load</label>
            <input class="search-input" id="searchInput" type="search" placeholder="Search MC / load…" autocomplete="off" />
            <div class="filter-sep" aria-hidden="true"></div>
            <button type="button" class="filter-btn green on" data-outcome="booked" aria-pressed="true">Booked</button>
            <button type="button" class="filter-btn red on" data-outcome="no_deal" aria-pressed="true">No deal</button>
            <button type="button" class="filter-btn orange on" data-outcome="abandoned" aria-pressed="true">Abandoned</button>
            <div class="filter-sep" aria-hidden="true"></div>
            <button type="button" class="btn" id="exportBtn">CSV</button>
          </div>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th scope="col" data-col="mc_number">MC <span class="sort-arrow">↕</span></th>
                <th scope="col" data-col="load_id">Load <span class="sort-arrow">↕</span></th>
                <th scope="col" data-col="outcome">Outcome <span class="sort-arrow">↕</span></th>
                <th scope="col" data-col="sentiment">Sentiment <span class="sort-arrow">↕</span></th>
                <th scope="col" data-col="agreed_rate">Rate <span class="sort-arrow">↕</span></th>
                <th scope="col" data-col="num_negotiations">Rounds <span class="sort-arrow">↕</span></th>
                <th scope="col" data-col="duration_seconds">Duration <span class="sort-arrow">↕</span></th>
                <th scope="col" data-col="created_at">Time <span class="sort-arrow">↕</span></th>
              </tr>
            </thead>
            <tbody id="callsTable"></tbody>
          </table>
        </div>
      </div>
    </div>
  </main>

<script>
const API_KEY = __API_KEY_JSON__;
let outcomeChart, sentimentChart, timelineChart;
let allCalls = [];
let sortCol = 'created_at', sortDir = -1;
let activeOutcomes = new Set(['booked', 'no_deal', 'abandoned']);
let autoRefresh = false;
let autoInterval = null;

function cssVar(name) {
  return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
}
function chartMonoFamily() {
  const raw = cssVar('--font-mono');
  if (!raw) return 'monospace';
  return raw.split(',')[0].replace(/['"]/g, '').trim() || 'monospace';
}
function chartLegendColor() {
  return cssVar('--chart-legend') || '#8b92a8';
}
function chartGridColor() {
  return cssVar('--chart-grid') || 'rgba(255,255,255,0.05)';
}

function animateValue(el, target, isFloat, suffix) {
  const dur = 700, start = performance.now();
  function step(now) {
    const p = Math.min((now - start) / dur, 1);
    const ease = 1 - Math.pow(1 - p, 3);
    el.textContent = (isFloat ? (target * ease).toFixed(1) : Math.round(target * ease)) + (suffix || '');
    if (p < 1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}
function el(tag, cls, txt) {
  const e = document.createElement(tag);
  if (cls) e.className = cls;
  if (txt !== undefined) e.textContent = txt;
  return e;
}
function fmtDuration(s) {
  if (!s) return '—';
  const m = Math.floor(s / 60), sec = s % 60;
  return m ? m + 'm ' + sec + 's' : sec + 's';
}
function fmtTime(ts) {
  if (!ts) return '—';
  try {
    const d = new Date(ts.replace(' ', 'T') + 'Z');
    return d.toLocaleDateString('en-US', {month:'short',day:'numeric'}) + ' ' +
           d.toLocaleTimeString('en-US', {hour:'2-digit',minute:'2-digit'});
  } catch { return ts.slice(0, 16); }
}

function syncFilterAria() {
  document.querySelectorAll('.filter-btn[data-outcome]').forEach(function(btn) {
    btn.setAttribute('aria-pressed', activeOutcomes.has(btn.dataset.outcome) ? 'true' : 'false');
  });
}

function renderKPIs(d) {
  const hint = document.getElementById('emptyGlobalHint');
  if (d.total_calls === 0) {
    hint.classList.remove('hidden');
    hint.textContent = 'No calls recorded yet — metrics populate when POST /calls is received.';
  } else {
    hint.classList.add('hidden');
    hint.textContent = '';
  }

  const avgRate  = d.avg_agreed_rate ? '$' + Number(d.avg_agreed_rate).toLocaleString('en-US', {maximumFractionDigits:0}) : '—';
  const rev      = d.total_revenue   ? '$' + Number(d.total_revenue).toLocaleString('en-US', {maximumFractionDigits:0})   : '$0';
  const bestRate = d.top_rate        ? '$' + Number(d.top_rate).toLocaleString('en-US', {maximumFractionDigits:0})         : '—';
  const avgDur   = d.avg_duration_seconds
    ? (d.avg_duration_seconds >= 60
        ? Math.floor(d.avg_duration_seconds / 60) + 'm ' + Math.round(d.avg_duration_seconds % 60) + 's'
        : Math.round(d.avg_duration_seconds) + 's')
    : '—';

  const todayDelta = (d.calls_today || 0) - (d.calls_yesterday || 0);
  function deltaBadge(delta) {
    if (delta === 0) return { cls: 'neutral', txt: 'same as yesterday' };
    return delta > 0
      ? { cls: 'up',   txt: '↑ ' + delta + ' vs yesterday' }
      : { cls: 'down', txt: '↓ ' + Math.abs(delta) + ' vs yesterday' };
  }

  const items = [
    {
      label: 'Conversion rate',
      val: d.conversion_rate * 100, cls: 'hero purple', vcls: 'purple',
      float: true, suffix: '%',
      sub: (d.booked || 0) + ' booked of ' + d.total_calls + ' calls',
      delta: null,
    },
    {
      label: 'Total calls', val: d.total_calls, cls: '', vcls: 'accent',
      float: false, suffix: '',
      sub: (d.calls_today || 0) + ' today',
      delta: deltaBadge(todayDelta),
    },
    {
      label: 'Booked', val: d.booked, cls: 'green', vcls: 'green',
      float: false, suffix: '', sub: null, delta: null,
    },
    {
      label: 'No deal', val: d.no_deal, cls: 'red', vcls: 'red',
      float: false, suffix: '', sub: null, delta: null,
    },
    {
      label: 'Revenue', val: null, cls: 'yellow', vcls: 'yellow',
      float: false, suffix: '', raw: rev, sub: null, delta: null,
    },
    {
      label: 'Avg rate', val: null, cls: 'green', vcls: 'green',
      float: false, suffix: '', raw: avgRate, sub: null, delta: null,
    },
    {
      label: 'Best rate', val: null, cls: 'orange', vcls: 'orange',
      float: false, suffix: '', raw: bestRate, sub: null, delta: null,
    },
    {
      label: 'Avg call duration', val: null, cls: '', vcls: 'accent',
      float: false, suffix: '', raw: avgDur, sub: null, delta: null,
    },
  ];

  const grid = document.getElementById('kpiGrid');
  grid.textContent = '';
  items.forEach(function(item) {
    const card = el('div', 'kpi-card ' + item.cls);
    card.appendChild(el('div', 'kpi-label', item.label));
    const valEl = el('div', 'kpi-value ' + item.vcls, item.raw || '0');
    card.appendChild(valEl);
    if (item.val !== null) animateValue(valEl, item.val, item.float, item.suffix);
    if (item.sub) card.appendChild(el('div', 'kpi-sub', item.sub));
    if (item.delta) card.appendChild(el('div', 'kpi-delta ' + item.delta.cls, item.delta.txt));
    grid.appendChild(card);
  });
}

function donutLegendOpts() {
  const mono = chartMonoFamily();
  return {
    plugins: {
      legend: {
        labels: {
          color: chartLegendColor(),
          font: { family: mono, size: 9 },
          padding: 10,
        },
      },
    },
    cutout: '68%',
  };
}

function scaleOpts() {
  const mono = chartMonoFamily();
  const g = chartGridColor();
  const tc = chartLegendColor();
  return {
    x: {
      ticks: { color: tc, font: { family: mono, size: 8 } },
      grid: { color: g },
    },
    y: {
      ticks: { color: tc, font: { family: mono, size: 8 }, stepSize: 1 },
      grid: { color: g },
      beginAtZero: true,
    },
  };
}

function renderCharts(d) {
  const bookedC = cssVar('--chart-booked');
  const noDealC = cssVar('--chart-no-deal');
  const abandC = cssVar('--chart-abandoned');
  const barTotal = cssVar('--chart-bar-total');
  const barTotalB = cssVar('--chart-bar-total-border');
  const barBook = cssVar('--chart-bar-booked');
  const barBookB = cssVar('--chart-bar-booked-border');
  const okC = cssVar('--ok');
  const dangerC = cssVar('--danger');

  if (outcomeChart) outcomeChart.destroy();
  outcomeChart = new Chart(document.getElementById('outcomeChart'), {
    type: 'doughnut',
    data: {
      labels: ['Booked', 'No deal', 'Abandoned'],
      datasets: [{
        data: [d.booked, d.no_deal, d.abandoned],
        backgroundColor: [bookedC, noDealC, abandC],
        borderWidth: 0,
        hoverOffset: 6,
      }],
    },
    options: donutLegendOpts(),
  });

  const sentLabels = Object.keys(d.sentiment_breakdown || {});
  const sentData = Object.values(d.sentiment_breakdown || {});
  const pos = cssVar('--chart-sent-pos');
  const neu = cssVar('--chart-sent-neu');
  const neg = cssVar('--chart-sent-neg');
  const sentColors = sentLabels.map(function(l) {
    return l === 'positive' ? pos : l === 'neutral' ? neu : neg;
  });
  if (sentimentChart) sentimentChart.destroy();
  sentimentChart = new Chart(document.getElementById('sentimentChart'), {
    type: 'doughnut',
    data: {
      labels: sentLabels.length ? sentLabels : ['—'],
      datasets: [{
        data: sentData.length ? sentData : [1],
        backgroundColor: sentColors.length ? sentColors : [chartGridColor()],
        borderWidth: 0,
        hoverOffset: 6,
      }],
    },
    options: donutLegendOpts(),
  });

  const timeline = d.calls_over_time || [];
  const days = timeline.map(function(t) { return t.date.slice(5); });
  const totals = timeline.map(function(t) { return t.total; });
  const bookedT = timeline.map(function(t) { return t.booked; });

  const trendEl = document.getElementById('trendLabel');
  const recent2 = totals.slice(-2);
  if (recent2.length === 2 && recent2[0] > 0) {
    const change = ((recent2[1] - recent2[0]) / recent2[0] * 100).toFixed(0);
    trendEl.textContent = (change >= 0 ? '▲ +' : '▼ ') + change + '% vs prior day';
    trendEl.style.color = change >= 0 ? okC : dangerC;
  } else {
    trendEl.textContent = '';
  }

  if (timelineChart) timelineChart.destroy();
  timelineChart = new Chart(document.getElementById('timelineChart'), {
    type: 'bar',
    data: {
      labels: days,
      datasets: [
        {
          label: 'Total',
          data: totals,
          backgroundColor: barTotal,
          borderColor: barTotalB,
          borderWidth: 1,
          borderRadius: 4,
        },
        {
          label: 'Booked',
          data: bookedT,
          backgroundColor: barBook,
          borderColor: barBookB,
          borderWidth: 1,
          borderRadius: 4,
        },
      ],
    },
    options: {
      plugins: {
        legend: {
          labels: {
            color: chartLegendColor(),
            font: { family: chartMonoFamily(), size: 9 },
            padding: 12,
          },
        },
      },
      scales: scaleOpts(),
    },
  });
}

function filteredCalls() {
  const q = (document.getElementById('searchInput').value || '').toLowerCase();
  return allCalls
    .filter(function(c) { return activeOutcomes.has(c.outcome); })
    .filter(function(c) {
      if (!q) return true;
      return (c.mc_number || '').toLowerCase().includes(q) ||
             (c.load_id || '').toLowerCase().includes(q);
    })
    .sort(function(a, b) {
      let av = a[sortCol], bv = b[sortCol];
      if (av == null) av = '';
      if (bv == null) bv = '';
      return av < bv ? sortDir : av > bv ? -sortDir : 0;
    });
}

function renderTable() {
  const calls = filteredCalls();
  const tbody = document.getElementById('callsTable');
  document.getElementById('tableCount').textContent = calls.length + ' / ' + allCalls.length + ' records';
  tbody.textContent = '';

  if (!calls.length) {
    const tr = document.createElement('tr');
    const td = el('td', 'empty-state', 'No matching records');
    td.setAttribute('colspan', '8');
    tr.appendChild(td);
    tbody.appendChild(tr);
    return;
  }

  calls.forEach(function(c) {
    const tr = document.createElement('tr');
    const tdMc = document.createElement('td');
    tdMc.appendChild(el('span', 'mc-badge', c.mc_number || '—'));
    tr.appendChild(tdMc);
    tr.appendChild(el('td', 'muted', c.load_id || '—'));
    const tdOut = document.createElement('td');
    tdOut.appendChild(el('span', 'badge badge-' + (c.outcome || ''), c.outcome || '—'));
    tr.appendChild(tdOut);
    const tdSent = document.createElement('td');
    const sent = c.sentiment || 'neutral';
    tdSent.appendChild(el('span', 'badge badge-' + sent, sent));
    tr.appendChild(tdSent);
    tr.appendChild(el('td', 'rate-value', c.agreed_rate ? '$' + Number(c.agreed_rate).toLocaleString() : '—'));
    const tdRounds = el('td', 'muted', String(c.num_negotiations ?? 0));
    tdRounds.style.textAlign = 'center';
    tr.appendChild(tdRounds);
    tr.appendChild(el('td', 'muted', fmtDuration(c.duration_seconds)));
    tr.appendChild(el('td', 'muted', fmtTime(c.created_at)));
    tbody.appendChild(tr);
  });
}

document.querySelectorAll('th[data-col]').forEach(function(th) {
  th.addEventListener('click', function() {
    const col = th.dataset.col;
    if (sortCol === col) { sortDir *= -1; }
    else { sortCol = col; sortDir = -1; }
    document.querySelectorAll('th[data-col]').forEach(function(t) { t.classList.remove('sorted'); });
    th.classList.add('sorted');
    th.querySelector('.sort-arrow').textContent = sortDir === -1 ? '↓' : '↑';
    renderTable();
  });
});

document.querySelectorAll('.filter-btn[data-outcome]').forEach(function(btn) {
  btn.addEventListener('click', function() {
    const o = btn.dataset.outcome;
    if (activeOutcomes.has(o)) { activeOutcomes.delete(o); btn.classList.remove('on'); }
    else { activeOutcomes.add(o); btn.classList.add('on'); }
    syncFilterAria();
    renderTable();
  });
});
syncFilterAria();

document.getElementById('searchInput').addEventListener('input', renderTable);

document.getElementById('exportBtn').addEventListener('click', function() {
  const calls = filteredCalls();
  const cols = ['mc_number','load_id','outcome','sentiment','agreed_rate','num_negotiations','duration_seconds','created_at'];
  const rows = [cols.join(',')].concat(calls.map(function(c) {
    return cols.map(function(k) { return JSON.stringify(c[k] ?? ''); }).join(',');
  }));
  const blob = new Blob([rows.join('\n')], { type: 'text/csv' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'acme-calls-' + new Date().toISOString().slice(0, 10) + '.csv';
  a.click();
});

document.getElementById('autoRefreshBtn').addEventListener('click', function() {
  autoRefresh = !autoRefresh;
  this.classList.toggle('active', autoRefresh);
  this.setAttribute('aria-pressed', autoRefresh ? 'true' : 'false');
  this.textContent = autoRefresh ? 'Auto (30s)' : 'Auto';
  clearInterval(autoInterval);
  if (autoRefresh) autoInterval = setInterval(loadMetrics, 30000);
});

async function loadMetrics() {
  try {
    const res = await fetch('/metrics', { headers: { 'x-api-key': API_KEY } });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const d = await res.json();
    allCalls = d.recent_calls || [];
    renderKPIs(d);
    renderCharts(d);
    renderTable();
  } catch (err) {
    console.error('Dashboard error:', err);
  }
}

document.getElementById('refreshBtn').addEventListener('click', loadMetrics);
loadMetrics();
</script>
</body>
</html>
